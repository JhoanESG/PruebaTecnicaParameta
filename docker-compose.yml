version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: empleados-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: empleados_db
      MYSQL_USER: empleado_user
      MYSQL_PASSWORD: empleado_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: